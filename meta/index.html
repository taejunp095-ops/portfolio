
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Meta Analysis</title>

  <link rel="stylesheet" href="../style.css" />

  <script type="module" src="../global.js"></script>
  <script type="module" src="main.js"></script>
</head>

<body>
  <h1>Codebase Meta Analysis</h1>

  <p>
    This page analyzes the commit history and structure of my portfolio
    project using D3 visualizations.
  </p>

  <section>
    <h2>Summary Statistics</h2>
    <div id="stats"></div>
  </section>

  <section>
    <h2>Commits by Time of Day</h2>

    <div id="chart"></div>

    <p id="selection-count">No commits selected</p>

    <dl id="language-breakdown" class="stats"></dl>
  </section>

  <!-- Tooltip -->
  <dl id="commit-tooltip" class="info tooltip" hidden>
    <dt>Commit</dt>
    <dd>
      <a href="" id="commit-link" target="_blank"></a>
    </dd>

    <dt>Date</dt>
    <dd id="commit-date"></dd>

    <dt>Time</dt>
    <dd id="commit-time"></dd>

    <dt>Author</dt>
    <dd id="commit-author"></dd>

    <dt>Lines Edited</dt>
    <dd id="commit-lines"></dd>
  </dl>
</body>
</html>
